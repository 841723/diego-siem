services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    working_dir: /app
    command: air   # 👈 hot reload Go

  log-generator:
    build: ./log-generator
    volumes:
      - ./log-generator:/app
    working_dir: /app
    command: python main.py

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/share/nginx/html